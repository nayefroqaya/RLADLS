experiment:
  # This version supports only in-domain experiments.
  case: in_domain

paths:
  data_dir: "datasets"
  dataset_path_template: "{dataset}/1_{dataset}_Splitted_Datasets"

split_files:
  train: "train_df.pkl"
  val: "val_df.pkl"
  test: "test_df.pkl"

data:
  # Change this for each in-domain run: BGL, HDFS, TH_1G, SP_150MB_ratio, SP_150MB
  dataset_name: HDFS
  group_col: Node_block_id
  time_col: Timestamp
  template_col: EventTemplate
  label_col: Label
  normal_label: Normal
  anomaly_label: Anomaly
  random_seed: 42

# Per-dataset column names. The code can also auto-detect common names.
dataset_columns:
  BGL:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id
  HDFS:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id
  TH_1G:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id
  SP_150MB:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id
  SP_150MB_ratio:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

# Since preprocessing already created Node_block_id windows,
# the code groups by Node_block_id and does not create new sliding windows.
dataset_group_cols:
  BGL: Node_block_id
  HDFS: Node_block_id
  TH_1G: Node_block_id
  SP_150MB: Node_block_id
  SP_150MB_ratio: Node_block_id

sequence:
  construction: group_by_column
  sequence_length: 120
  sliding_step: 1

slm:
  enabled: true
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  freeze: true
  batch_size: 64
  cache_dir: "outputs/slm_cache"

env:
  # More balanced default rewards for reducing false positives while keeping recall.
  continue_penalty: -0.01
  correct_alert_reward: 10.0
  false_alert_penalty: -20.0
  missed_anomaly_penalty: -30.0
  correct_normal_reward: 6.0
  early_detection_bonus: 1.0

model:
  id_embedding_dim: 64
  hidden_dim: 128
  learning_rate: 0.0005
  gamma: 0.99
  batch_size: 64
  replay_capacity: 50000
  target_update_steps: 500
  train_steps: 20000
  warmup_steps: 1000
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 12000

evaluation:
  show_progress: true
  save_results: true
  results_dir: "outputs/evaluation_results"

  false_positive_cost: 10.0
  false_negative_cost: 20.0
  delay_cost: 5.0

  # Validation-based post-hoc calibration.
  tune_threshold_on_validation: true

  # Recommended for imbalanced anomaly detection.
  # Options: f1, f2, cost, precision, recall, balanced_accuracy
  threshold_metric: f2

  # Wider range helps datasets such as HDFS where the best threshold may be below -2.
  threshold_min: -10.0
  threshold_max: 5.0
  threshold_steps: 100

  decision_threshold: 0.0
  min_alert_step: 1

output:
  output_dir: outputs
  checkpoint_name: indomain_ftadls_dqn.pt
