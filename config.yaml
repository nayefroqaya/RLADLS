experiment:
  # Choose one case and run with: python main.py --config config.yaml
  # Options:
  #   in_domain                  = train/val/test on one dataset
  #   cross_dataset_adaptation   = train on source datasets, test target, adapt with normal target data, test again
  #   both                       = run in_domain first, then cross_dataset_adaptation
  case: in_domain

paths:
  data_dir: "datasets"
  dataset_path_template: "{dataset}/1_{dataset}_Splitted_Datasets"

split_files:
  train: "train_df.pkl"
  val: "val_df.pkl"
  test: "test_df.pkl"

data:
  # Used for in-domain runs.
  dataset_name: SP_150MB_ratio

  # All datasets already have preprocessed windows/sequences in Node_block_id.
  # The code uses this column as the RL episode boundary.
  group_col: Node_block_id

  time_col: Timestamp
  template_col: EventTemplate
  label_col: Label
  normal_label: Normal
  anomaly_label: Anomaly
  random_seed: 42

# Dataset-specific sequence/group columns.
# Node_block_id already comes from your preprocessing window step for all datasets.
dataset_group_cols:
  HDFS: Node_block_id
  BGL: Node_block_id
  TH_1G: Node_block_id
  SP_150MB: Node_block_id

sequence:
  # group_by_column means: do NOT create new sliding windows.
  # Instead, assemble each RL episode by grouping rows with the same Node_block_id.
  # Options: group_by_column, sliding_window, auto
  construction: group_by_column
  sequence_length: 120
  sliding_step: 1

slm:
  enabled: true
  #model_name: "sentence-transformers/all-MiniLM-L6-v2"
  model_name: "microsoft/MiniLM-L12-H384-uncased"

  freeze: true
  batch_size: 64
  cache_dir: "outputs/slm_cache"

env:
  continue_penalty: -0.01
  correct_alert_reward: 10.0
  false_alert_penalty: -20.0
  missed_anomaly_penalty: -20.0
  correct_normal_reward: 5.0
  early_detection_bonus: 1.0

model:
  id_embedding_dim: 64
  hidden_dim: 128
  learning_rate: 0.0005
  gamma: 0.99
  batch_size: 64
  replay_capacity: 50000
  target_update_steps: 500
  train_steps: 20000
  warmup_steps: 1000
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 12000

adaptation:
  # Cross-dataset experiment.
  enabled: true

  # Leave-one-target example:
  # source_datasets are used for source training.
  # target_dataset is used for direct-transfer evaluation and adaptation.
  source_datasets:
    - XX
    - XX
    - XX
  target_dataset: XXX

  # Target adaptation uses only normal target training sequences.
  target_normal_fraction: 0.20

  # DQN fine-tuning steps on the 20% normal target training data.
  adapt_steps: 5000
  adapt_learning_rate: 0.0001

  # Usually lower exploration during adaptation.
  epsilon_start: 0.20
  epsilon_end: 0.05
  epsilon_decay_steps: 3000

  # Checkpoints.
  source_checkpoint_name: "cross_source_dqn.pt"
  adapted_checkpoint_name: "cross_adapted_dqn.pt"



evaluation:
  show_progress: true
  save_results: true
  results_dir: "outputs/evaluation_results"

  false_positive_cost: 10.0
  false_negative_cost: 20.0
  delay_cost: 5.0

  # Post-hoc calibration
  tune_threshold_on_validation: true

  # Choose one:
  #   f1
  #   cost
  #   precision
  #   recall
  #   balanced_accuracy
  threshold_metric: f1

  threshold_min: -2.0
  threshold_max: 5.0
  threshold_steps: 50

  # Default threshold before tuning.
  decision_threshold: 0.0

  # Prevent alerting at the first event.
  # Try 1 first. If false positives are still high, try 2 or 3.
  min_alert_step: 1

output:
  output_dir: outputs
  checkpoint_name: dqn_minilm_log_anomaly.pt
