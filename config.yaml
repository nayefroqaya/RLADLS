run:
  # Options:
  #   train
  #   eval_checkpoint
  mode: train

  # Used only when mode: eval_checkpoint.
  checkpoint_path: "outputs/indomain_ftadls_dqn.pt"

experiment:
  # This version supports only in-domain experiments.
  case: in_domain

paths:
  data_dir: "datasets"
  dataset_path_template: "{dataset}/1_{dataset}_Splitted_Datasets"

split_files:
  train: "train_df.pkl"
  val: "val_df.pkl"
  test: "test_df.pkl"

data:
  # Change this for each in-domain run:
  # BGL, HDFS, TH_1G, SP_150MB, SP_150MB_ratio
  dataset_name: HDFS

  group_col: Node_block_id
  time_col: Timestamp
  template_col: EventTemplate
  label_col: Label

  normal_label: Normal
  anomaly_label: Anomaly
  random_seed: 42

dataset_columns:
  BGL:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

  HDFS:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

  TH_1G:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

  SP_150MB:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

  SP_150MB_ratio:
    template_col: EventTemplate
    label_col: Label
    time_col: Timestamp
    group_col: Node_block_id

# Preprocessing already created Node_block_id windows.
# The code groups by Node_block_id and does not create new sliding windows.
dataset_group_cols:
  BGL: Node_block_id
  HDFS: Node_block_id
  TH_1G: Node_block_id
  SP_150MB: Node_block_id
  SP_150MB_ratio: Node_block_id

sequence:
  construction: group_by_column
  sequence_length: 120
  sliding_step: 1

slm:
  enabled: true
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  freeze: true
  batch_size: 64
  cache_dir: "outputs/slm_cache"

semi_supervised:
  enabled: true

  # True anomaly labels are NOT used during training.
  use_anomaly_labels_for_training: false

  # Use labeled normal sequences only to learn normal behavior.
  labeled_normal_fraction: 1.0

  # Keep this 0.0 to avoid supervised anomaly training.
  labeled_anomaly_fraction: 0.0

  # Unlabeled sequences receive pseudo-rewards from normal-behavior deviation.
  use_pseudo_rewards: true

  # Lower value reduces the influence of uncertain pseudo-labels.
  pseudo_reward_weight: 0.10

  # Higher value creates fewer pseudo-anomaly samples.
  # Use 0.99 to reduce false alerts.
  normal_score_quantile: 0.99

  transition_smoothing: 1.0

env:
  # Tuned for better early detection while keeping false positives controlled.
  continue_penalty: -0.03
  correct_alert_reward: 12.0
  false_alert_penalty: -25.0
  missed_anomaly_penalty: -45.0
  correct_normal_reward: 7.0
  early_detection_bonus: 3.0

training_sampling:
  enabled: true

  # This is pseudo-anomaly sampling, not true anomaly sampling.
  # It uses reward_label from normal-deviation scoring.
  anomaly_fraction: 0.20

  keep_original_size: true

model:
  id_embedding_dim: 64
  hidden_dim: 128
  learning_rate: 0.0005
  gamma: 0.99
  batch_size: 64
  replay_capacity: 50000
  target_update_steps: 500

  train_steps: 30000

  warmup_steps: 1000
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 18000

evaluation:
  show_progress: true
  save_results: true
  results_dir: "outputs/evaluation_results"

  false_positive_cost: 10.0
  false_negative_cost: 20.0
  delay_cost: 5.0

  tune_threshold_on_validation: true

  # Options:
  #   f1
  #   f2
  #   cost
  #   precision
  #   recall
  #   balanced_accuracy
  threshold_metric: f1

  # Faster threshold tuning than 100/150 steps.
  threshold_min: -5.0
  threshold_max: 5.0
  threshold_steps: 25

  decision_threshold: 0.0
  min_alert_step: 1

output:
  output_dir: outputs
  checkpoint_name: indomain_ftadls_dqn.pt